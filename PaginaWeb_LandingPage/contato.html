    <main class="conteudo-principal">
      <main class="contato">

  <h2>Contato</h2>

  <form onsubmit=>

    
    <label>Nome completo:</label><br>
    <input type="text" placeholder="Digite seu nome" required><br><br>

    <label>Telefone:</label><br>
    <input type="tel" placeholder="(00) 00000-0000" required><br><br>

   
    <label>E-mail:</label><br>
    <input type="email" placeholder="seuemail@email.com" required><br><br>

  
    <label>Tipo de pessoa:</label><br>
    <input type="radio" name="tipo"> Pessoa Física
    <input type="radio" name="tipo"> Pessoa Jurídica
    <br><br>


    <label>Melhor horário para contato:</label><br>
    <select>
      <option>Manhã</option>
      <option>Tarde</option>
      <option>Noite</option>
    </select>
    <br><br>


    <label>Tipo de serviço:</label><br>
    <input type="checkbox"> Desenvolvimento Web<br>
    <input type="checkbox"> Backend<br>
    <input type="checkbox"> Banco de Dados<br>
    <br>

  
    <label>Descreva o que você precisa:</label><br>
    <textarea rows="4" cols="40"></textarea>
    <br><br>

 
    <button type="submit" class="botao-enviar">
      Enviar Formulário
    </button>

  </form>

</main>
